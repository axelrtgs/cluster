---
# yaml-language-server: $schema=https://kubernetes-schemas.zinn.ca/helm.toolkit.fluxcd.io/helmrelease_v2beta1.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: home-assistant
    namespace: home-assistant
spec:
    interval: 15m
    chart:
        spec:
            chart: home-assistant
            version: 30.5.0
            sourceRef:
                kind: HelmRepository
                name: truecharts
                namespace: flux-system

    values:
        TZ: America/Montreal
        cnpg:
            main:
                backups:
                    credentials: s3
                    enabled: true
                    retentionPolicy: ""
                    revision: "1"
                cluster:
                    instances: 2
                    singleNode: true
                database: home-assistant
                enabled: true
                hibernate: false
                mode: recovery
                monitoring:
                    disableDefaultQueries: false
                    enablePodMonitor: true
                password: PLACEHOLDERPASSWORD
                pgVersion: 16
                pooler:
                    enabled: false
                recovery:
                    enabled: true
                    revision: ""
                    credentials: s3
                user: home-assistant
        credentials:
            s3:
                type: s3
                url: "${S3URL}"
                bucket: "${S3BUCKET}"
                accessKey: "${S3ID}"
                secretKey: "${S3KEY}"
                encrKey: "${S3ENCRKEY}"
        homeassistant:
            trusted_proxies:
                - 172.17.0.0/16
                - 172.18.0.0/16
        ingress:
            main:
                enabled: true
                ingressClassName: external
                hosts:
                    - host: hass.${BASE_DOMAIN}
                      paths:
                        - path: /
                          pathType: Prefix
                integrations:
                    certManager:
                        certificateIssuer: domain-0-le-prod
                        enabled: true
        service:
            main:
                enabled: true
                loadBalancerIP: ${HOMEASSISTANT_IP}
                ports:
                    main:
                        enabled: true
                        port: 8123
                        protocol: tcp
                        targetPort: 8123
                    mdns:
                        enabled: true
                        port: 5353
                        protocol: udp
                        targetPort: 5353
                    homekit:
                        enabled: true
                        port: 21063
                        protocol: tcp
                        targetPort: 21063
                type: LoadBalancer
        workload:
            main:
                podSpec:
                    hostNetwork: true
        persistence:
            config:
                enabled: true
                mountPath: /config
                targetSelectAll: true
                volsync:
                    - credentials: s3
                      dest:
                        enabled: true
                      name: s3
                      src:
                        enabled: true
                      type: restic
